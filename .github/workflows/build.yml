name: Build Bobgram

on:
  workflow_dispatch:
    inputs:
      telegram_tag:
        description: 'Telegram-iOS git tag (leave empty for latest)'
        required: false
        default: ''

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      # ── 1. Checkout this repo ────────────────────────────────────────────────
      - name: Checkout bobgram repo
        uses: actions/checkout@v4

      # ── 2. Clone Telegram-iOS source ─────────────────────────────────────────
      - name: Clone Telegram-iOS
        run: |
          TAG="${{ github.event.inputs.telegram_tag }}"
          if [ -n "$TAG" ]; then
            git clone --depth=1 --branch "$TAG" \
              https://github.com/TelegramMessenger/Telegram-iOS.git
          else
            git clone --depth=1 \
              https://github.com/TelegramMessenger/Telegram-iOS.git
          fi

      # ── 3. Select Xcode ──────────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      # ── 4. Install deps ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bazelisk
        run: |
          brew install bazelisk
          bazel version

      # ── 5. Apply Bobgram name patches ─────────────────────────────────────────
      - name: Patch name Telegram → Bobgram
        run: bash patch.sh Telegram-iOS

      # ── 6. Prepare build config (читает шаблон, вставляет API ключи) ──────────
      - name: Prepare Bobgram config
        working-directory: Telegram-iOS
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          echo "=== Template config ==="
          cat build-system/template_minimal_development_configuration.json
          echo ""
          echo "=== Fake codesigning contents ==="
          ls build-system/fake-codesigning/

          python3 - <<'PYEOF'
import json, os, sys

with open('build-system/template_minimal_development_configuration.json') as f:
    config = json.load(f)

api_id  = os.environ.get('TELEGRAM_API_ID', '')
api_hash = os.environ.get('TELEGRAM_API_HASH', '')

def patch(obj):
    if isinstance(obj, dict):
        for k in list(obj.keys()):
            if k in ('apiId', 'api_id'):
                obj[k] = api_id
            elif k in ('apiHash', 'api_hash'):
                obj[k] = api_hash
            else:
                patch(obj[k])
    elif isinstance(obj, list):
        for item in obj:
            patch(item)

patch(config)

with open('../bobgram-config.json', 'w') as f:
    json.dump(config, f, indent=2)

print('bobgram-config.json written')
PYEOF

      # ── 7. Build ──────────────────────────────────────────────────────────────
      - name: Build Bobgram
        working-directory: Telegram-iOS
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
          EXPANDED_CODE_SIGN_IDENTITY: ""
        run: |
          mkdir -p ../build-output
          python3 build-system/Make/Make.py build \
            --configurationPath=../bobgram-config.json \
            --buildNumber=${{ github.run_number }} \
            --configuration=release_arm64 \
            --codesigningInformationPath=build-system/fake-codesigning \
            --outputBuildArtifactsPath=../build-output

      # ── 8. Найти или упаковать IPA ────────────────────────────────────────────
      - name: Package IPA
        run: |
          # outputBuildArtifactsPath уже кладёт IPA туда
          IPA=$(find build-output -name "*.ipa" | head -1)

          if [ -n "$IPA" ]; then
            cp "$IPA" Bobgram.ipa
            echo "IPA from build-output: $(ls -lh Bobgram.ipa)"
          else
            # Fallback: упаковать .app вручную
            APP=$(find Telegram-iOS -name "*.app" \
                  -not -path "*/\.*" \
                  -not -name "*Tests*" \
                  | head -1)
            if [ -z "$APP" ]; then
              echo "ERROR: neither .ipa nor .app found"
              find . -name "*.app" -o -name "*.ipa" 2>/dev/null | head -20
              exit 1
            fi
            echo "Packaging .app manually: $APP"
            mkdir -p payload/Payload
            cp -R "$APP" payload/Payload/Bobgram.app
            cd payload && zip -qr ../Bobgram.ipa Payload
            cd ..
            echo "IPA packed: $(ls -lh Bobgram.ipa)"
          fi

      # ── 9. Upload artifact ────────────────────────────────────────────────────
      - name: Upload Bobgram.ipa
        uses: actions/upload-artifact@v4
        with:
          name: Bobgram-${{ github.run_number }}.ipa
          path: Bobgram.ipa
          retention-days: 14
