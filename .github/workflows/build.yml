name: Build Bobgram

on:
  workflow_dispatch:
    inputs:
      telegram_tag:
        description: 'Telegram-iOS git tag (leave empty for latest)'
        required: false
        default: ''

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      # ── 1. Checkout this repo ────────────────────────────────────────────────
      - name: Checkout bobgram repo
        uses: actions/checkout@v4

      # ── 2. Clone Telegram-iOS source ─────────────────────────────────────────
      - name: Clone Telegram-iOS
        run: |
          TAG="${{ github.event.inputs.telegram_tag }}"
          if [ -n "$TAG" ]; then
            git clone --depth=1 --branch "$TAG" \
              https://github.com/TelegramMessenger/Telegram-iOS.git
          else
            git clone --depth=1 \
              https://github.com/TelegramMessenger/Telegram-iOS.git
          fi

      # ── 3. Select Xcode ──────────────────────────────────────────────────────
      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      # ── 4. Install deps ───────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bazelisk
        run: |
          brew install bazelisk
          bazel version

      # ── 5. Apply Bobgram name patches ─────────────────────────────────────────
      - name: Patch name Telegram → Bobgram
        run: bash patch.sh Telegram-iOS

      # ── 6. Write Telegram API credentials ─────────────────────────────────────
      - name: Write API config
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          CONFIG="Telegram-iOS/Config/BuildConfig.json"
          mkdir -p "$(dirname "$CONFIG")"
          cat > "$CONFIG" <<EOF
          {
            "api_id": "$TELEGRAM_API_ID",
            "api_hash": "$TELEGRAM_API_HASH"
          }
          EOF

      # ── 7. Build (без подписи — для Sideloadly) ───────────────────────────────
      - name: Build Bobgram
        working-directory: Telegram-iOS
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
          EXPANDED_CODE_SIGN_IDENTITY: ""
        run: |
          python3 build-system/Make/Make.py \
            --configuration=release_arm64 \
            --buildNumber=${{ github.run_number }} \
            --version=1.0.${{ github.run_number }} \
            --disableProvisioningProfiles || true

      # ── 8. Упаковать в IPA ────────────────────────────────────────────────────
      - name: Package IPA
        run: |
          APP=$(find Telegram-iOS -name "*.app" \
                -not -path "*/\.*" \
                -not -name "*Tests*" \
                | head -1)

          if [ -z "$APP" ]; then
            echo "ERROR: .app not found"
            find Telegram-iOS/build -type d -name "*.app" 2>/dev/null || true
            exit 1
          fi

          echo "Found: $APP"
          mkdir -p output/Payload
          cp -R "$APP" output/Payload/Bobgram.app
          cd output && zip -qr ../Bobgram.ipa Payload
          cd ..
          echo "IPA size: $(du -sh Bobgram.ipa)"

      # ── 9. Upload artifact ────────────────────────────────────────────────────
      - name: Upload Bobgram.ipa
        uses: actions/upload-artifact@v4
        with:
          name: Bobgram-${{ github.run_number }}.ipa
          path: Bobgram.ipa
          retention-days: 14
