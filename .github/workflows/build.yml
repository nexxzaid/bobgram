name: Build Bobgram

on:
  workflow_dispatch:
    inputs:
      telegram_tag:
        description: 'Telegram-iOS git tag (leave empty for latest)'
        required: false
        default: ''

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 180

    steps:
      - name: Checkout bobgram repo
        uses: actions/checkout@v4

      - name: Clone Telegram-iOS
        run: |
          TAG="${{ github.event.inputs.telegram_tag }}"
          if [ -n "$TAG" ]; then
            git clone --depth=1 --branch "$TAG" https://github.com/TelegramMessenger/Telegram-iOS.git
          else
            git clone --depth=1 https://github.com/TelegramMessenger/Telegram-iOS.git
          fi

      - name: Select Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bazelisk
        run: |
          brew install bazelisk
          bazel version

      - name: Patch name Telegram to Bobgram
        run: bash patch.sh Telegram-iOS

      - name: Show template config and fake-codesigning
        working-directory: Telegram-iOS
        run: |
          cat build-system/template_minimal_development_configuration.json
          echo "---"
          ls build-system/fake-codesigning/

      - name: Prepare Bobgram config
        working-directory: Telegram-iOS
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
        run: |
          python3 ../prepare_config.py \
            build-system/template_minimal_development_configuration.json \
            ../bobgram-config.json

      - name: Build Bobgram
        working-directory: Telegram-iOS
        env:
          CODE_SIGNING_ALLOWED: "NO"
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGN_IDENTITY: ""
          EXPANDED_CODE_SIGN_IDENTITY: ""
        run: |
          mkdir -p ../build-output
          python3 build-system/Make/Make.py build \
            --configurationPath=../bobgram-config.json \
            --buildNumber=${{ github.run_number }} \
            --configuration=release_arm64 \
            --codesigningInformationPath=build-system/fake-codesigning \
            --outputBuildArtifactsPath=../build-output

      - name: Package IPA
        run: |
          IPA=$(find build-output -name "*.ipa" | head -1)
          if [ -n "$IPA" ]; then
            cp "$IPA" Bobgram.ipa
          else
            APP=$(find Telegram-iOS -name "*.app" -not -path "*/\.*" -not -name "*Tests*" | head -1)
            if [ -z "$APP" ]; then
              echo "ERROR: no .ipa or .app found"
              find . -name "*.app" -o -name "*.ipa" 2>/dev/null | head -20
              exit 1
            fi
            mkdir -p payload/Payload
            cp -R "$APP" payload/Payload/Bobgram.app
            cd payload && zip -qr ../Bobgram.ipa Payload
          fi
          echo "IPA: $(ls -lh Bobgram.ipa)"

      - name: Upload Bobgram.ipa
        uses: actions/upload-artifact@v4
        with:
          name: Bobgram-${{ github.run_number }}.ipa
          path: Bobgram.ipa
          retention-days: 14
